<!DOCTYPE html>
<html lang="pt-BR">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Financas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --border: #2e2e3e;
    --text: #f0f0f5; --muted: #7070a0; --green: #4ade80; --red: #f87171;
    --blue: #60a5fa; --yellow: #fbbf24; --purple: #a78bfa;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; }
  .phone { width: 100%; max-width: 430px; padding: 16px 16px 90px; min-height: 100vh; }
  .header { padding: 20px 0 16px; display: flex; justify-content: space-between; align-items: flex-start; }
  .header-left .greeting { font-size: 12px; color: var(--muted); font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; }
  .header-left .month { font-size: 22px; font-weight: 700; margin-top: 2px; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .header-right .date { font-size: 12px; color: var(--muted); }
  .refresh-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 11px; padding: 4px 10px; cursor: pointer; font-family: 'Inter', sans-serif; }
  .screen { display: none; }
  .screen.active { display: block; }
  .card-disponivel { border-radius: 16px; padding: 18px; margin-bottom: 10px; }
  .card-disponivel.ok { background: linear-gradient(135deg, #1e2a1e, #1a2e1a); border: 1px solid #2e4a2e; }
  .card-disponivel.danger { background: linear-gradient(135deg, #2a1e1e, #2e1a1a); border: 1px solid #4a2e2e; }
  .card-disponivel.waiting { background: linear-gradient(135deg, #1e1e2a, #1a1a2e); border: 1px solid #2e2e4a; }
  .card-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .card-disponivel.ok .card-label { color: #5a8a5a; }
  .card-disponivel.danger .card-label { color: #8a5a5a; }
  .card-disponivel.waiting .card-label { color: #5a5a8a; }
  .card-value-big { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .card-disponivel.ok .card-value-big { color: var(--green); }
  .card-disponivel.danger .card-value-big { color: var(--red); }
  .card-disponivel.waiting .card-value-big { color: var(--blue); }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .card-disponivel.danger .card-sub { color: #a07070; }
  .card-disponivel.waiting .card-sub { color: #7070a0; }
  .progress-wrap { margin-top: 12px; }
  .progress-bar-bg { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 5px; }
  .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .card { background: var(--surface); border-radius: 16px; padding: 16px; border: 1px solid var(--border); }
  .card.full { grid-column: 1 / -1; }
  .card .card-label { color: var(--muted); }
  .card-value { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .card-value.green { color: var(--green); }
  .card-value.yellow { color: var(--yellow); }
  .card-value.blue { color: var(--blue); }
  .card .card-sub { color: var(--muted); font-size: 11px; margin-top: 4px; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 20px 0 10px; }
  .lancamento { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--surface); border-radius: 12px; margin-bottom: 6px; border: 1px solid var(--border); gap: 10px; }
  .lanc-left { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .lanc-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lanc-meta { font-size: 11px; color: var(--muted); }
  .lanc-mid { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .lanc-badge { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 99px; text-transform: uppercase; }
  .badge-cc { background: #1a2a1a; color: var(--green); }
  .badge-cartao { background: #2a1f3d; color: var(--purple); }
  .badge-swile { background: #2a2210; color: var(--yellow); }
  .badge-receita { background: #1a2a2a; color: var(--blue); }
  .lanc-parcela { font-size: 9px; color: var(--purple); font-weight: 500; }
  .lanc-valor { font-size: 14px; font-weight: 600; }
  .lanc-valor.gasto { color: var(--red); }
  .lanc-valor.receita { color: var(--green); }
  .btn-excluir { background: transparent; border: none; color: #4a3a3a; font-size: 16px; cursor: pointer; padding: 4px; flex-shrink: 0; }
  .btn-excluir:active { color: var(--red); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  .loading { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }
  .form-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .form-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .tipo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .tipo-btn { padding: 13px 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; font-family: 'Inter', sans-serif; }
  .tipo-btn.sel-gasto { border-color: var(--red); color: var(--red); background: #2a1a1a; }
  .tipo-btn.sel-receita { border-color: var(--green); color: var(--green); background: #1a2a1a; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .field input, .field select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; color: var(--text); font-size: 15px; font-family: 'Inter', sans-serif; outline: none; appearance: none; -webkit-appearance: none; }
  .field input:focus, .field select:focus { border-color: var(--blue); }
  .field select option { background: #1a1a22; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .meio-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .meio-btn { padding: 13px 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; font-family: 'Inter', sans-serif; }
  .meio-btn.sel-pix { border-color: var(--green); color: var(--green); background: #1a2a1a; }
  .meio-btn.sel-cc { border-color: var(--purple); color: var(--purple); background: #1e1a2e; }
  .meio-btn.sel-swile { border-color: var(--yellow); color: var(--yellow); background: #2a2210; }
  .parcela-field { display: none; }
  .parcela-field.visible { display: block; }
  .gasto-fields { display: none; }
  .gasto-fields.visible { display: block; }
  .btn-lancar { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; font-family: 'Inter', sans-serif; }
  .btn-lancar.gasto { background: var(--red); color: #1a0a0a; }
  .btn-lancar.receita { background: var(--green); color: #0a1a0a; }
  .btn-lancar:disabled { opacity: 0.5; cursor: not-allowed; }
  .swile-header { background: linear-gradient(135deg, #2a2210, #221a08); border: 1px solid #3a3010; border-radius: 16px; padding: 20px; margin-bottom: 14px; }
  .swile-saldo-label { font-size: 11px; color: #8a7040; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .swile-saldo-value { font-size: 32px; font-weight: 700; color: var(--yellow); letter-spacing: -0.02em; }
  .swile-saldo-sub { font-size: 12px; color: #8a7040; margin-top: 4px; }
  .config-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .config-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .btn-salvar { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--blue); color: #0a0a1a; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; font-family: 'Inter', sans-serif; }
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 10px 0 24px; z-index: 50; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; border: none; background: transparent; color: var(--muted); font-size: 10px; font-family: 'Inter', sans-serif; font-weight: 500; padding: 4px 0; }
  .nav-item.active { color: var(--green); }
  .nav-icon { font-size: 20px; line-height: 1; }
  .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); padding: 10px 22px; border-radius: 99px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; white-space: nowrap; }
  .toast.success { background: var(--green); color: #0a1a0a; }
  .toast.error { background: var(--red); color: #1a0a0a; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="header-left">
      <div class="greeting" id="header-mes"></div>
      <div class="month">Financas</div>
    </div>
    <div class="header-right">
      <div class="date" id="header-data"></div>
      <button class="refresh-btn" onclick="carregarTudo()">Atualizar</button>
    </div>
  </div>

  <div class="screen active" id="screen-painel">
    <div id="painel-content"><div class="loading">Carregando...</div></div>
  </div>

  <div class="screen" id="screen-lancar">
    <div class="form-title">Novo lancamento</div>
    <div class="form-sub">O que voce quer registrar?</div>
    <div class="tipo-grid">
      <button class="tipo-btn" onclick="selectTipo(this,'gasto')">Gasto</button>
      <button class="tipo-btn" onclick="selectTipo(this,'receita')">Receita</button>
    </div>
    <div class="field"><label>Descricao</label><input type="text" id="f-desc" placeholder="Ex: Almoco, Reembolso..."></div>
    <div class="field"><label>Valor (R$)</label><input type="number" id="f-valor" placeholder="0.00" inputmode="decimal" step="0.01"></div>
    <div class="gasto-fields" id="gasto-fields">
      <div class="field">
        <label>Meio de pagamento</label>
        <div class="meio-grid">
          <button class="meio-btn" onclick="selectMeio(this,'pix')">PIX / CC</button>
          <button class="meio-btn" onclick="selectMeio(this,'cc')">Cartao</button>
          <button class="meio-btn" onclick="selectMeio(this,'swile')">Swile</button>
        </div>
      </div>
      <div class="field parcela-field" id="parcela-wrap">
        <label>Parcelamento</label>
        <div class="field-row">
          <div>
            <label style="font-size:10px;margin-bottom:4px;display:block;">Num. parcelas</label>
            <input type="number" id="f-parcelas" placeholder="1" min="1" max="48" value="1" inputmode="numeric">
          </div>
          <div>
            <label style="font-size:10px;margin-bottom:4px;display:block;">Parcela atual</label>
            <input type="number" id="f-parcela-atual" placeholder="1" min="1" max="48" value="1" inputmode="numeric">
          </div>
        </div>
      </div>
      <div class="field">
        <label>Categoria</label>
        <select id="f-cat">
          <option value="">Selecione...</option>
          <option>Alimentacao</option><option>Transporte</option><option>Saude</option>
          <option>Lazer</option><option>Casa</option><option>Assinatura</option>
          <option>Presente</option><option>Carro</option><option>Pessoal</option><option>Outro</option>
        </select>
      </div>
      <div class="field">
        <label>Recorrente?</label>
        <select id="f-rec"><option value="Nao">Nao</option><option value="Sim">Sim</option></select>
      </div>
    </div>
    <button class="btn-lancar" id="btn-lancar" onclick="lancar()">Selecione o tipo acima</button>
  </div>

  <div class="screen" id="screen-swile">
    <div id="swile-content"><div class="loading">Carregando...</div></div>
  </div>

  <div class="screen" id="screen-config">
    <div class="config-title">Configuracao do mes</div>
    <div class="config-sub">Atualize no inicio de cada mes.</div>
    <div class="field"><label>Salario (R$)</label><input type="number" id="c-salario"></div>
    <div class="field"><label>Dia do salario</label><input type="number" id="c-dia-salario" placeholder="Ex: 29" min="1" max="31"></div>
    <div class="field"><label>Meta de investimento (R$)</label><input type="number" id="c-meta"></div>
    <div class="field"><label>Swile mensal (R$)</label><input type="number" id="c-swile"></div>
    <div class="field"><label>Saldo atual Swile (R$)</label><input type="number" id="c-swile-saldo"></div>
    <div class="field"><label>Fixos recorrentes (R$)</label><input type="number" id="c-fixos"></div>
    <button class="btn-salvar" onclick="salvarConfig()">Salvar configuracao</button>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active" id="nav-painel" onclick="switchTab('painel')"><span class="nav-icon">&#9633;</span>Painel</button>
    <button class="nav-item" id="nav-lancar" onclick="switchTab('lancar')"><span class="nav-icon">&#43;</span>Lancar</button>
    <button class="nav-item" id="nav-swile" onclick="switchTab('swile')"><span class="nav-icon">&#9672;</span>Swile</button>
    <button class="nav-item" id="nav-config" onclick="switchTab('config')"><span class="nav-icon">&#9881;</span>Config</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx4AC6djmaTij-DbavYFVE18pe2PQSOsglpqCgjhVlMkrdWcHEWmL939tzmK_mlIW7S/exec';
let meioSelecionado = null;
let tipoSelecionado = null;
let cache = { config: {}, lancamentos: [], swile: [] };

function fmt(v) {
  if (isNaN(v)||v===null||v===undefined) return 'R$ 0,00';
  return 'R$ ' + Math.abs(v).toLocaleString('pt-BR', {minimumFractionDigits:2,maximumFractionDigits:2});
}
function showToast(msg, tipo='success') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+tipo+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  if (tab==='config') preencherConfig();
}
function selectTipo(btn, tipo) {
  document.querySelectorAll('.tipo-btn').forEach(b=>b.className='tipo-btn');
  tipoSelecionado=tipo;
  btn.classList.add('sel-'+tipo);
  const gf=document.getElementById('gasto-fields');
  const bl=document.getElementById('btn-lancar');
  if (tipo==='gasto') {
    gf.classList.add('visible');
    bl.textContent='Registrar gasto';
    bl.className='btn-lancar gasto';
  } else {
    gf.classList.remove('visible');
    bl.textContent='Registrar receita';
    bl.className='btn-lancar receita';
  }
}
function selectMeio(btn, tipo) {
  document.querySelectorAll('.meio-btn').forEach(b=>b.className='meio-btn');
  meioSelecionado=tipo;
  btn.classList.add('sel-'+tipo);
  const pw=document.getElementById('parcela-wrap');
  if (tipo==='cc') pw.classList.add('visible');
  else pw.classList.remove('visible');
}
async function fetchAba(aba, range) {
  const res=await fetch(`${SCRIPT_URL}?aba=${aba}&range=${range}`);
  const data=await res.json();
  return data.values||[];
}
async function postScript(body) {
  const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(body)});
  return res.json();
}
async function carregarTudo() {
  try {
    const [configRows,lancRows,swileRows]=await Promise.all([
      fetchAba('Configuracao','A1:B6'),
      fetchAba('Lancamentos','A2:G500'),
      fetchAba('Swile','A2:D500')
    ]);
    cache.config={};
    configRows.forEach(r=>{ if(r[0]) cache.config[r[0]]=r[1]; });
    cache.lancamentos=lancRows.filter(r=>r[1]).map((r,i)=>({0:r[0],1:r[1],2:r[2],3:r[3],4:r[4],5:r[5],6:r[6],_idx:i+2}));
    cache.swile=swileRows.filter(r=>r[1]).map((r,i)=>({0:r[0],1:r[1],2:r[2],3:r[3],_idx:i+2}));
    renderPainel();
    renderSwile();
  } catch(e) { showToast('Erro ao carregar.','error'); console.error(e); }
}
function parseNum(v) { return parseFloat(String(v||'0').replace(/[^0-9.,\-]/g,'').replace(',','.'))||0; }
function getMesAtual() {
  const h=new Date();
  return `${String(h.getMonth()+1).padStart(2,'0')}/${h.getFullYear()}`;
}
function parseData(raw) {
  if (!raw) return null;
  const s = String(raw);
  // formato DD/MM/YYYY
  if (s.includes('/')) {
    const p = s.split('/');
    if (p.length >= 3) return new Date(p[2].slice(0,4), p[1]-1, p[0]);
  }
  // formato ISO 2026-06-01T...
  if (s.includes('T') || s.match(/^\d{4}-\d{2}-\d{2}/)) {
    return new Date(s);
  }
  return null;
}

function lancamentosDoMes(lancs) {
  const hoje = new Date();
  const mes = hoje.getMonth();
  const ano = hoje.getFullYear();
  return lancs.filter(r => {
    const d = parseData(r[0]);
    if (!d) return false;
    return d.getMonth() === mes && d.getFullYear() === ano;
  });
}
function renderPainel() {
  const cfg=cache.config;
  const salario=parseNum(cfg['Sal\u00e1rio']||cfg['Salario']||cfg['SAL\u00c1RIO']);
  const diaSalario=parseInt(cfg['Dia do Sal\u00e1rio']||cfg['Dia do Salario']||cfg['Dia do salario']||'1');
  const meta=parseNum(cfg['Meta Investimento']);
  const fixos=parseNum(cfg['Fixos Recorrentes']);
  const swileMensal=parseNum(cfg['Swile Mensal'])||2000;

  // salario so conta apos o dia configurado
  const hoje=new Date();
  const aguardandoSalario=hoje.getDate()<diaSalario;
  const salarioContabilizado=aguardandoSalario?0:salario;
  const swileSaldo=aguardandoSalario?0:parseNum(cfg["Swile Saldo Atual"]);

  const lancMes=lancamentosDoMes(cache.lancamentos);
  let gastoCC=0, gastoCartao=0;
  lancMes.forEach(r=>{
    const v=parseNum(r[2]);
    if (v>0) return; // ignora receitas no calculo de disponivel
    if(r[3]==='Cartao') gastoCartao+=Math.abs(v);
    else gastoCC+=Math.abs(v);
  });

  const totalGasto=gastoCC+gastoCartao;
  const limiteGasto=salarioContabilizado-meta-fixos;
  const disponivel=limiteGasto-totalGasto;
  const isDanger=disponivel<0 && !aguardandoSalario;
  const isWaiting=aguardandoSalario;
  const pctGasto=limiteGasto>0?Math.min((totalGasto/limiteGasto)*100,100):0;

  let cardClass='ok', cardSub='';
  if (isWaiting) {
    cardClass='waiting';
    cardSub=`Salario cai dia ${diaSalario}. Saldo baseado em receitas do mes.`;
  } else if (isDanger) {
    cardClass='danger';
    cardSub='Consumindo meta de investimento: '+fmt(Math.abs(disponivel));
  } else {
    cardSub='Meta de '+fmt(meta)+' intacta';
  }

  const lancs=[...cache.lancamentos].reverse().slice(0,8);
  const lancsHTML=lancs.length===0
    ?'<div class="empty-state">Nenhum lancamento ainda.</div>'
    :lancs.map(r=>{
      const v=parseNum(r[2]);
      const isReceita=v>0;
      const meio=r[3]||'';
      let badge, badgeLabel;
      if(isReceita){badge='badge-receita';badgeLabel='Receita';}
      else if(meio==='Cartao'){badge='badge-cartao';badgeLabel='Cartao';}
      else if(meio==='Swile'){badge='badge-swile';badgeLabel='Swile';}
      else{badge='badge-cc';badgeLabel='PIX';}
      const parcela=r[6]?`<span class="lanc-parcela">${r[6]}</span>`:'';
      const desc=r[1]||'-';
      return `<div class="lancamento">
        <div class="lanc-left"><div class="lanc-desc">${desc}</div><div class="lanc-meta">${r[0]||''} ${r[4]?'· '+r[4]:''}</div></div>
        <div class="lanc-mid"><span class="lanc-badge ${badge}">${badgeLabel}</span>${parcela}<span class="lanc-valor ${isReceita?'receita':'gasto'}">${isReceita?'+':'-'}${fmt(Math.abs(v))}</span></div>
        <button class="btn-excluir" onclick="excluir('Lancamentos',${r._idx},'${desc.replace(/'/g,"\\'")}')">&#10005;</button>
      </div>`;
    }).join('');

  document.getElementById('painel-content').innerHTML=`
    <div class="card-disponivel ${cardClass}">
      <div class="card-label">Disponivel para gastar</div>
      <div class="card-value-big">${fmt(disponivel)}</div>
      <div class="card-sub">${cardSub}</div>
      <div class="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pctGasto}%;background:${isDanger?'var(--red)':isWaiting?'var(--blue)':'var(--green)'};"></div></div>
        <div class="progress-labels"><span>Gasto: ${fmt(totalGasto)}</span><span>Limite: ${fmt(limiteGasto)}</span></div>
      </div>
    </div>
    <div class="cards-grid">
      <div class="card"><div class="card-label">Conta corrente</div><div class="card-value green">${fmt(salarioContabilizado-fixos-gastoCC-gastoCartao)}</div><div class="card-sub">Saldo estimado</div></div>
      <div class="card"><div class="card-label">Swile</div><div class="card-value yellow">${fmt(swileSaldo)}</div><div class="card-sub">Saldo atual</div></div>
      <div class="card full"><div class="card-label">Cartao de credito</div><div class="card-value blue">${fmt(gastoCartao)}</div><div class="card-sub">Gasto esse mes</div></div>
    </div>
    <div class="section-title">Lancamentos</div>${lancsHTML}`;
}
function renderSwile() {
  const cfg=cache.config;
  const swileSaldo=aguardandoSalario?0:parseNum(cfg["Swile Saldo Atual"]);
  const swileMensal=parseNum(cfg['Swile Mensal'])||2000;
  const hoje=new Date();
  const diasRestantes=new Date(hoje.getFullYear(),hoje.getMonth()+1,0).getDate()-hoje.getDate();
  const pct=swileMensal>0?Math.min(((swileMensal-swileSaldo)/swileMensal)*100,100):0;

  const lancsSwile=[...cache.swile].reverse().slice(0,8);
  const lancsHTML=lancsSwile.map(r=>{
    const v=Math.abs(parseNum(r[2]));
    const desc=r[1]||'-';
    return `<div class="lancamento">
      <div class="lanc-left"><div class="lanc-desc">${desc}</div><div class="lanc-meta">${r[0]||''} ${r[3]?'· '+r[3]:''}</div></div>
      <div class="lanc-mid"><span class="lanc-badge badge-swile">Swile</span><span class="lanc-valor gasto">-${fmt(v)}</span></div>
      <button class="btn-excluir" onclick="excluir('Swile',${r._idx},'${desc.replace(/'/g,"\\'")}')">&#10005;</button>
    </div>`;
  }).join('')||'<div class="empty-state">Nenhum lancamento Swile ainda.</div>';

  document.getElementById('swile-content').innerHTML=`
    <div class="swile-header">
      <div class="swile-saldo-label">Saldo Swile</div>
      <div class="swile-saldo-value">${fmt(swileSaldo)}</div>
      <div class="swile-saldo-sub">${aguardando?'Swile cai dia '+diaSalario:diasRestantes+' dias restantes · mensal '+fmt(swileMensal)}</div>
      <div class="progress-wrap" style="margin-top:14px;">
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:var(--yellow);"></div></div>
        <div class="progress-labels" style="color:#8a7040;"><span>Usado: ${fmt(swileMensal-swileSaldo)}</span><span>Total: ${fmt(swileMensal)}</span></div>
      </div>
    </div>
    <div class="section-title">Lancamentos Swile</div>${lancsHTML}
    <div style="margin-top:16px;padding:14px;background:var(--surface);border-radius:12px;border:1px solid var(--border);">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.08em;">Atualizar saldo Swile</div>
      <div style="display:flex;gap:8px;">
        <input type="number" id="swile-novo-saldo" placeholder="Ex: 450.00" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:Inter,sans-serif;outline:none;">
        <button onclick="atualizarSwile()" style="background:var(--yellow);color:#1a1000;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;">Salvar</button>
      </div>
    </div>`;
}
async function atualizarSwile() {
  const val=document.getElementById('swile-novo-saldo').value;
  if(!val){showToast('Digite o saldo atual.','error');return;}
  try {
    await postScript({action:'write',aba:'Configuracao',range:'B5',values:[[val]]});
    cache.config['Swile Saldo Atual']=val;
    showToast('Saldo Swile atualizado!');
    renderSwile();
    renderPainel();
  } catch(e){showToast('Erro ao salvar.','error');}
}
function preencherConfig() {
  const cfg=cache.config;
  document.getElementById('c-salario').value=parseNum(cfg['Sal\u00e1rio']||cfg['Salario'])||'';
  document.getElementById('c-dia-salario').value=cfg['Dia do Sal\u00e1rio']||cfg['Dia do Salario']||cfg['Dia do salario']||'';
  document.getElementById('c-meta').value=parseNum(cfg['Meta Investimento'])||'';
  document.getElementById('c-swile').value=parseNum(cfg['Swile Mensal'])||'';
  document.getElementById('c-swile-saldo').value=parseNum(cfg['Swile Saldo Atual'])||'';
  document.getElementById('c-fixos').value=parseNum(cfg['Fixos Recorrentes'])||'';
}
async function salvarConfig() {
  const s=document.getElementById('c-salario').value;
  const ds=document.getElementById('c-dia-salario').value;
  const m=document.getElementById('c-meta').value;
  const sw=document.getElementById('c-swile').value;
  const swS=document.getElementById('c-swile-saldo').value;
  const f=document.getElementById('c-fixos').value;
  if(!s||!ds||!m||!sw||!f){showToast('Preencha todos os campos.','error');return;}
  try {
    await postScript({action:'write',aba:'Configuracao',range:'A1:B6',values:[
      ['Salario',s],['Dia do Salario',ds],['Meta Investimento',m],
      ['Swile Mensal',sw],['Swile Saldo Atual',swS||'0'],['Fixos Recorrentes',f]
    ]});
    showToast('Configuracao salva!');
    await carregarTudo();
  } catch(e){showToast('Erro ao salvar.','error');}
}
async function excluir(aba, rowIdx, desc) {
  if(!confirm(`Excluir "${desc}"?`)) return;
  try {
    await postScript({action:'delete',aba,row:rowIdx});
    showToast('Lancamento excluido!');
    await carregarTudo();
  } catch(e){showToast('Erro ao excluir.','error');}
}
async function lancar() {
  if(!tipoSelecionado){showToast('Selecione Gasto ou Receita.','error');return;}
  const desc=document.getElementById('f-desc').value.trim();
  const valorTotal=parseFloat(document.getElementById('f-valor').value);
  if(!desc||!valorTotal){showToast('Preencha descricao e valor.','error');return;}
  if(tipoSelecionado==='gasto'&&!meioSelecionado){showToast('Selecione o meio de pagamento.','error');return;}
  const btn=document.getElementById('btn-lancar');
  btn.disabled=true; btn.textContent='Salvando...';
  const hoje=new Date();
  const data=`${String(hoje.getDate()).padStart(2,'0')}/${String(hoje.getMonth()+1).padStart(2,'0')}/${hoje.getFullYear()}`;
  let row, aba;
  if(tipoSelecionado==='receita'){
    aba='Lancamentos';
    row=[data,desc,`${valorTotal}`,'PIX / CC','Receita','Nao',''];
  } else if(meioSelecionado==='swile'){
    aba='Swile';
    const cat=document.getElementById('f-cat').value||'Outro';
    row=[data,desc,`-${valorTotal}`,cat];
  } else {
    aba='Lancamentos';
    const cat=document.getElementById('f-cat').value||'Outro';
    const rec=document.getElementById('f-rec').value;
    const meioLabel=meioSelecionado==='cc'?'Cartao':'PIX / CC';
    let parcelaLabel='';
    if(meioSelecionado==='cc'){
      const np=parseInt(document.getElementById('f-parcelas').value)||1;
      const pa=parseInt(document.getElementById('f-parcela-atual').value)||1;
      const vp=(valorTotal/np).toFixed(2);
      parcelaLabel=np>1?`${pa}/${np}`:'';
      row=[data,desc,`-${vp}`,meioLabel,cat,rec,parcelaLabel];
    } else {
      row=[data,desc,`-${valorTotal}`,meioLabel,cat,rec,''];
    }
  }
  try {
    await postScript({action:'append',aba,row});
    showToast(tipoSelecionado==='receita'?'Receita registrada!':'Gasto registrado!');
    document.getElementById('f-desc').value='';
    document.getElementById('f-valor').value='';
    document.getElementById('f-cat').value='';
    document.getElementById('f-parcelas').value='1';
    document.getElementById('f-parcela-atual').value='1';
    document.getElementById('parcela-wrap').classList.remove('visible');
    document.getElementById('gasto-fields').classList.remove('visible');
    document.querySelectorAll('.meio-btn').forEach(b=>b.className='meio-btn');
    document.querySelectorAll('.tipo-btn').forEach(b=>b.className='tipo-btn');
    meioSelecionado=null; tipoSelecionado=null;
    btn.className='btn-lancar'; btn.textContent='Selecione o tipo acima';
    await carregarTudo();
    setTimeout(()=>switchTab('painel'),800);
  } catch(e){showToast('Erro ao registrar.','error');}
  btn.disabled=false;
}
const hoje=new Date();
const meses=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
document.getElementById('header-mes').textContent=meses[hoje.getMonth()]+' '+hoje.getFullYear();
document.getElementById('header-data').textContent='Hoje, '+hoje.getDate()+' '+meses[hoje.getMonth()].toLowerCase().slice(0,3);
carregarTudo();
</script>
</body>
